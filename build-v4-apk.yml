name: Build Finance Desk V4 - 38 Tools

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-v4-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Extract uniquely named V4 source
        run: unzip -q finance-desk-v4-38-tools.zip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Refuse to build an old package
        working-directory: finance-desk-main
        run: |
          grep -q "38 decision tools" index.html
          grep -q "True Loan APR" index.html
          grep -q "V4.1 · 38 TOOLS · VERIFIED BUILD" index.html

      - name: Install components and run all checks
        working-directory: finance-desk-main
        run: npm ci && npm test && npm run cap:sync

      - name: Build verified V4 APK
        working-directory: finance-desk-main/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload unmistakable V4 APK
        uses: actions/upload-artifact@v4
        with:
          name: finance-desk-v4-38-tools-apk
          path: finance-desk-main/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
